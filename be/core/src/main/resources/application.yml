# MQTT Configuration
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  websocket-url: ${MQTT_WEBSOCKET_URL:ws://localhost:8083/mqtt}
  client-id: ${MQTT_CLIENT_ID:spring-ecom-backend}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  completion-timeout: 5000
  connection-timeout: 30
  clean-session: true
  auto-reconnect: true

