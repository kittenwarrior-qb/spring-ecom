spring:
  application:
    name: spring-ecom-server
    
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: spring-ecom-server-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ecom_db
    username: postgres
    password: quocbui26042005
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# gRPC Configuration
grpc:
  server:
    port: 9091
  client:
    landingpage-service:
      address: static://localhost:9090
      negotiation-type: plaintext

# Server Configuration
server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Logging Configuration
logging:
  level:
    com.example.spring_ecom: DEBUG
    org.springframework.web: INFO  # Giảm từ DEBUG xuống INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.apache.catalina.connector.CoyoteAdapter: WARN  # Giảm log cho client disconnect
    org.springframework.web.servlet.mvc.method.annotation: WARN  # Giảm log cho response writing errors

# JWT Configuration
jwt:
  secret: your-secret-key-change-this-in-production-minimum-256-bits-for-security
  expiration: 86400000

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false

# Payment Webhook Configuration
payment:
  webhook:
    api-key: my-secret-webhook-key-12345

# SePay Configuration
