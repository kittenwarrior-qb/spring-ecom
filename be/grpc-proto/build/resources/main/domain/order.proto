syntax = "proto3";

package domain;

option java_package = "com.example.spring_ecom.grpc.domain";
option java_outer_classname = "OrderProto";

import "google/protobuf/timestamp.proto";

message Order {
  int64 id = 1;
  string order_number = 2;
  int64 user_id = 3;
  string status = 4;
  string payment_method = 5;
  string payment_status = 6;
  double subtotal = 7;
  double shipping_fee = 8;
  double discount = 9;
  double total = 10;
  string shipping_address = 11;
  string shipping_city = 12;
  string shipping_district = 13;
  string shipping_ward = 14;
  string recipient_name = 15;
  string recipient_phone = 16;
  string note = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
  repeated OrderItem items = 20;
}

message OrderItem {
  int64 id = 1;
  int64 order_id = 2;
  int64 product_id = 3;
  string product_title = 4;
  int32 quantity = 5;
  int32 cancelled_quantity = 6;
  double price = 7;
  double subtotal = 8;
  string status = 9;
  google.protobuf.Timestamp cancelled_at = 10;
}