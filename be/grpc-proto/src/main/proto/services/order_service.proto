syntax = "proto3";

package services;

option java_package = "com.example.spring_ecom.grpc.services";
option java_outer_classname = "OrderServiceProto";

import "common/common.proto";
import "domain/order.proto";

service OrderService {
  // Order management (Admin)
  rpc GetOrders(GetOrdersRequest) returns (GetOrdersResponse);
  rpc GetOrderDetail(GetOrderDetailRequest) returns (GetOrderDetailResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc GetOrderStatistics(GetOrderStatisticsRequest) returns (GetOrderStatisticsResponse);
}

message GetOrdersRequest {
  common.PageRequest page_request = 1;
  string search = 2;
  string status = 3;
  string payment_status = 4;
  string date_from = 5;
  string date_to = 6;
}

message GetOrdersResponse {
  repeated domain.Order orders = 1;
  common.PageResponse page_response = 2;
}

message GetOrderDetailRequest {
  int64 order_id = 1;
}

message GetOrderDetailResponse {
  domain.Order order = 1;
}

message UpdateOrderStatusRequest {
  int64 order_id = 1;
  string status = 2;
}

message UpdateOrderStatusResponse {
  domain.Order order = 1;
}

message GetOrderStatisticsRequest {
  string period = 1; // daily, weekly, monthly, yearly
  string date_from = 2;
  string date_to = 3;
}

message GetOrderStatisticsResponse {
  int64 total_orders = 1;
  double total_revenue = 2;
  int64 pending_orders = 3;
  int64 completed_orders = 4;
  int64 cancelled_orders = 5;
  repeated DailyStats daily_stats = 6;
}

message DailyStats {
  string date = 1;
  int64 orders = 2;
  double revenue = 3;
}