syntax = "proto3";

package domain;

option java_package = "com.example.spring_ecom.grpc.domain";
option java_outer_classname = "ProductProto";

import "google/protobuf/timestamp.proto";

message Product {
  int64 id = 1;
  string title = 2;
  string slug = 3;
  string author = 4;
  string publisher = 5;
  int32 publication_year = 6;
  string language = 7;
  int32 pages = 8;
  string format = 9;
  string description = 10;
  double price = 11;
  double discount_price = 12;
  int32 stock_quantity = 13;
  string cover_image_url = 14;
  bool is_bestseller = 15;
  bool is_active = 16;
  int32 view_count = 17;
  int32 sold_count = 18;
  double rating_average = 19;
  int32 rating_count = 20;
  int64 category_id = 21;
  google.protobuf.Timestamp created_at = 22;
  google.protobuf.Timestamp updated_at = 23;
}

message Category {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  int64 parent_id = 5;
  int32 display_order = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}