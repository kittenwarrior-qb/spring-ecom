syntax = "proto3";

package domain;

option java_package = "com.example.spring_ecom.grpc.domain";
option java_outer_classname = "CouponProto";

import "google/protobuf/timestamp.proto";

enum DiscountType {
  DISCOUNT_TYPE_UNSPECIFIED = 0;
  DISCOUNT_TYPE_PERCENTAGE = 1;
  DISCOUNT_TYPE_FIXED_AMOUNT = 2;
}

message Coupon {
  int64 id = 1;
  string code = 2;
  string description = 3;
  DiscountType discount_type = 4;
  double discount_value = 5;
  double min_order_value = 6;
  double max_discount = 7;
  int32 usage_limit = 8;
  int32 used_count = 9;
  google.protobuf.Timestamp start_date = 10;
  google.protobuf.Timestamp end_date = 11;
  bool is_active = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message CouponValidationResult {
  bool valid = 1;
  string message = 2;
  Coupon coupon = 3;
  double discount_amount = 4;
}
