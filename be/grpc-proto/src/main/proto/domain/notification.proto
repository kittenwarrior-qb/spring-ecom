syntax = "proto3";

package domain;

option java_package = "com.example.spring_ecom.grpc.domain";
option java_outer_classname = "NotificationProto";

message Notification {
  int64 id = 1;
  int64 user_id = 2;
  string type = 3;
  string title = 4;
  string message = 5;
  int64 reference_id = 6;
  string reference_type = 7;
  string image_url = 8;
  string action_url = 9;
  bool is_read = 10;
  string created_at = 11;
}
