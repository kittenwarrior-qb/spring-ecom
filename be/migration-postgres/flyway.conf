# Flyway Configuration for E-commerce Microservices
# =============================================================================

# Database connection
flyway.url=jdbc:postgresql://localhost:5432/spring_ecom_db
flyway.user=postgres
flyway.password=quocbui26042005
flyway.driver=org.postgresql.Driver

# Migration settings
flyway.locations=classpath:db/migration
flyway.schemas=public
flyway.table=flyway_schema_history

# Validation settings
flyway.validateOnMigrate=true
flyway.cleanOnValidationError=false
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.baselineDescription=Initial baseline

# Encoding
flyway.encoding=UTF-8

flyway.placeholders.database_name=spring_ecom_db
flyway.placeholders.schema_name=public

# Development settings (disable in production)
flyway.cleanDisabled=false

# Connection settings
flyway.connectRetries=3
flyway.connectRetriesInterval=10